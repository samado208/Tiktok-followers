<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body{
    margin:0;
    padding:0;
    background:#050505;
    font-family:Arial;
    color:white;
}

.container{
    width:90%;
    max-width:430px;
    margin:40px auto;
    background:#111;
    border-radius:30px;
    padding:25px;
    border:1px solid #222;
    box-shadow:0 0 60px rgba(0,242,234,0.15);
}

.logo{
    text-align:center;
    font-size:55px;
    margin-top:10px;
}

h1{
    text-align:center;
    font-size:50px;
    line-height:1.1;
    margin-top:10px;
    font-weight:800;
}

.desc{
    text-align:center;
    color:#999;
    font-size:20px;
    line-height:1.6;
    margin-top:20px;
}

.stats{
    display:flex;
    gap:15px;
    margin-top:30px;
}

.box{
    flex:1;
    background:#090909;
    padding:25px;
    border-radius:20px;
    text-align:center;
}

.box h2{
    margin:0;
    font-size:42px;
    color:#00f2ea;
}

.box p{
    color:#888;
    margin-top:10px;
    font-size:18px;
}

input{
    width:100%;
    margin-top:30px;
    padding:18px;
    border:none;
    border-radius:18px;
    background:#050505;
    color:white;
    font-size:18px;
    box-sizing:border-box;
}

button{
    width:100%;
    margin-top:20px;
    padding:20px;
    border:none;
    border-radius:20px;
    font-size:34px;
    font-weight:bold;
    color:white;
    background:linear-gradient(90deg,#00f2ea,#ff0050);
}

.steps{
    margin-top:35px;
}

.step{
    background:#090909;
    padding:22px;
    border-radius:18px;
    margin-top:15px;
    font-size:22px;
}

.footer{
    text-align:center;
    color:#666;
    margin-top:35px;
    font-size:16px;
}

</style>
</head>

<body>

<div class="container">

<div class="logo">🚀</div>

<h1>
Get Free<br>
TikTok Followers
</h1>

<div class="desc">
Complete one quick offer and unlock free followers & views instantly.
</div>

<div class="stats">

<div class="box">
<h2>12K+</h2>
<p>Users</p>
</div>

<div class="box">
<h2>1.8M</h2>
<p>Views Sent</p>
</div>

</div>

<input type="text" placeholder="Enter TikTok Username">

<button>Unlock Now</button>

<div class="steps">

<div class="step">
1️⃣ Enter your TikTok username
</div>

<div class="step">
2️⃣ Complete one short offer
</div>

<div class="step">
3️⃣ Unlock your free reward
</div>

</div>

<div class="footer">
No password required • Mobile Friendly
</div>

</div>

</body>
